<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Comprendre l'antisémitisme</title>
    <script>
      // GitHub Pages SPA redirect
      // Redirects all 404s to index.html so react-router can handle them
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
